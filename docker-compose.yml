services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: rigo-postgres
    environment:
      POSTGRES_DB: rigo_db
      POSTGRES_USER: rigo_admin
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/database.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rigo_admin -d rigo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: rigo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Rigo API service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rigo-api
    env_file:
      - .env
    environment:
      DB_ADDR: ${DB_ADDR:-postgres://rigo_admin:password@postgres:5432/rigo_db?sslmode=disable}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      ACCESS_SECRET: ${ACCESS_SECRET:-your-super-secret-access-key-change-in-production}
      REFRESH_SECRET: ${REFRESH_SECRET:-your-super-secret-refresh-key-change-in-production}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
