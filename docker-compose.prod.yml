services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: rigo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rigo_db
      POSTGRES_USER: rigo_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/database.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rigo_admin -d rigo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: rigo-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Rigo API service
  api:
    image: registry.digitalocean.com/${DOCR_NAME}/api:latest
    container_name: rigo-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_ADDR: postgres://${DB_USER:-rigo_admin}:${DB_PASSWORD:-password}@postgres:5432/rigo_db?sslmode=disable
      REDIS_ADDR: redis:6379
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  redis_data:
